# Railway Production Profile Configuration
# Railway automatically sets environment variables for database connection

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.forward-headers-strategy=framework

# PostgreSQL Database - Using Railway Environment Variables
# Railway sets these automatically: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration for Production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false
# # Logging - Less verbose for production
# logging.level.root=WARN
# logging.level.com.tyss=INFO

# Server Properties
server.shutdown=graceful
server.tomcat.threads.max=200

# MVC View Configuration
spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/

# Logging
logging.level.root=INFO
logging.level.com.tyss=DEBUG
