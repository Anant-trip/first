spring.application.name=26-Student-Management
server.port=${PORT:8080}

spring.DATABASE_URL="${{Postgres.DATABASE_URL}}"
spring.PGHOST="${{Postgres.PGHOST}}"
spring.PGPASSWORD="${{Postgres.PGPASSWORD}}"
spring.POSTGRES_PASSWORD="${{Postgres.POSTGRES_PASSWORD}}"
spring.POSTGRES_USER="${{Postgres.POSTGRES_USER}}"
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true



spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/
